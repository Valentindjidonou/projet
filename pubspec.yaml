name: mes_notes
description: "Application de gestion de notes - Projet D-CLIC Développement Mobile (Niveau Intermédiaire)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3       # requis pour SQLite sur Linux / Windows / macOS
  path: ^1.9.0
  path_provider: ^2.1.3
  crypto: ^3.0.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  provider: ^6.1.2
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
